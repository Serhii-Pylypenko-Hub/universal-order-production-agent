name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
      - name: Write debug summary on failure
        if: failure()
        run: |
          echo "## CI failed" >> $GITHUB_STEP_SUMMARY
          echo "Check tests, schema changes, and service functions." >> $GITHUB_STEP_SUMMARY
